name: Release drafter

# Push events to every tag not containing "/"
#
# Publish the commons JAR to Maven Local, and create 'artifacts.tar.gz'
# using build dir and adding the contents of repository
#
on:
  push:
    tags:
      - "*"

jobs:
  draft-a-release:
    name: Draft a release
    runs-on: ubuntu-latest
    if: github.repository == 'opensearch-project/opensearch-jvector'
    permissions:
      issues: write
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up JDK 21
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle
      - id: get_data
        run: |
          echo "approvers=$(cat .github/CODEOWNERS | grep @ | tr -d '*\n ' | sed 's/@/,/g' | sed 's/,//1')" >> $GITHUB_OUTPUT
          echo "version=$(./gradlew -Dbuild.snapshot=false properties | grep -E '^version:' | awk '{print $2}')" >> $GITHUB_OUTPUT
      - uses: trstringer/manual-approval@fa642940caf8412403569b28b2db4a1df08a83a3 # v1
        with:
          secret: ${{ github.TOKEN }}
          approvers: ${{ steps.get_data.outputs.approvers }}
          minimum-approvals: 1
          issue-title: 'Release OpenSearch jVector ${{ steps.get_data.outputs.version }}'
          issue-body: "Please approve or deny the release of OpenSearch jVector **TAG**: ${{ github.ref_name }}  **COMMIT**: ${{ github.sha }} **VERSION** : ${{ steps.get_data.outputs.version }} "
          exclude-workflow-initiator-as-approver: true
      - name: Build with Gradle
        run: |
          OS_VERSION=`./gradlew -Dbuild.snapshot=false properties | grep -iE "^version:" | cut -d: -f2 | cut -d. -f1-3 | tr -d ' '`
          echo "OS_VERSION $OS_VERSION"
          ./gradlew --no-daemon -Dbuild.snapshot=false -Dopensearch.version=$OS_VERSION publishNebulaPublicationToLocalRepoRepository
          ./gradlew --no-daemon -Dbuild.snapshot=false -Dopensearch.version=$OS_VERSION publishPluginZipPublicationToLocalRepoRepository
          tar -C build -czvf artifacts.tar.gz repository
      - name: Draft a release
        uses: ncipollo/release-action@339a81892b84b4eeb0f6e744e4574d79d0d9b8dd
        with:
          immutableCreate: true
          generateReleaseNotes: true
          artifacts: "artifacts.tar.gz"
          prerelease: true

